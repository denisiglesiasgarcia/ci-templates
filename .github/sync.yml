group:
  # Add more POS repos below, one "owner/repo" per line inside the `repos: |` block.
  - repos: |
      denisiglesiasgarcia/amoen_calcul_objectif_dashboard
      denisiglesiasgarcia/sitg-api
      denisiglesiasgarcia/sitg-geocode
      denisiglesiasgarcia/amoen-python
      denisiglesiasgarcia/calcul_idc_dashboard
    files:
      - source: .pre-commit-config.yaml
      - source: Makefile
      - source: scripts/auto_bump_patch.sh
      - source: scripts/tag_version.sh
    PR_LABELS:
      - sync
    PR_BODY: |
      Synced shared dev-tooling config from [ci-templates](https://github.com/denisiglesiasgarcia/ci-templates).

      Review the diff, then merge to pick up the update.
    COMMIT_PREFIX: "chore(sync): "
