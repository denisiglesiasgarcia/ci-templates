name: Sync files to POS repos

on:
  push:
    branches: [main]
    paths:
      - ".pre-commit-config.yaml"
      - "Makefile"
      - "scripts/**"
      - ".github/sync.yml"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
